server {
    server_name www.configwifi.com configwifi.com;

    root /home/configwifi/app/website/build;
    index index.html;

    # Webhook endpoint — forward to webhook listener
    location /hooks/deploy {
        proxy_pass http://BACKEND_IP:9000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Serve llms.txt files with correct content type
    location ~ \.(txt)$ {
        default_type text/plain;
    }

    # Static site — try files, then index.html for SPA routing
    location / {
        try_files $uri $uri/index.html $uri.html /index.html;
    }

    # Cache static assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    listen 80;
    # Certbot will add SSL config here after: certbot --nginx -d configwifi.com -d www.configwifi.com
}
